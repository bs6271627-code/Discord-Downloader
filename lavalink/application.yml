server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false

  server:
    password: "youshallnotpass"
    sources:
      youtube: false       # Handled by youtube-plugin below.
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    # 3 s buffer prevents mid-song drops on any momentary network hiccup.
    # 400 ms (the previous value) was far too short for a cloud/datacenter host.
    bufferDurationMs: 3000
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # ── Client selection rationale ────────────────────────────────────────
    # MUSIC          – YouTube Music InnerTube client.  No Playback support;
    #                  included solely for ytmsearch: metadata quality.
    #                  Falls through to the next client for actual streaming.
    # TVHTML5_SIMPLY – Embedded TV HTML5 player.  Has Opus, supports
    #                  Playback + Livestream.  Most reliable from datacenter
    #                  IPs because it's the same client used by embedded
    #                  third-party YouTube players (low scrutiny from YT).
    # MWEB           – Mobile web client.  Has Opus, Playback + Livestream.
    #                  Mobile endpoints are less aggressively rate-limited
    #                  from server IPs than the desktop WEB client.
    # ANDROID_VR     – VR/Daydream Android client.  Has Opus, full Playback.
    #                  Rarely targeted by YouTube's datacenter blocks.
    # ANDROID_MUSIC  – Android YouTube Music client.  Has Opus, Playback.
    #                  Kept as last-resort fallback; can return HTTP 400 or
    #                  "This video requires login" from datacenter IPs under
    #                  heavy load, but remains useful when others fail.
    #
    # Removed: IOS (no Opus → always transcodes → higher CPU + latency),
    #          ANDROID (documented as "heavily restricted, frequently
    #          dysfunctional" in the youtube-source README).
    clients:
      - MUSIC
      - TVHTML5_SIMPLY
      - MWEB
      - ANDROID_VR
      - ANDROID_MUSIC

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
